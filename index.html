<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>가톨릭 성지순례</title>
<style>
/* 1. 디자인 시스템: 표지와 앱 전체 디자인 통일 */
:root { --navy:#0e1535; --gold:#d4aa6a; --ink:#1F2937; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:var(--navy); font-family:'Noto Sans KR',sans-serif; overflow:hidden; }

/* 표지(Cover) 스타일 */
#cover {
  position:fixed; inset:0; z-index:10000; background:var(--navy);
  padding:calc(env(safe-area-inset-top, 20px) + 20px) 16px;
  overflow-y:auto; display:flex; flex-direction:column; align-items:center;
}
html.app-active #cover { display:none !important; } /* 앱 시작 시 표지 숨김 */

.cv-inner { width:100%; max-width:440px; text-align:center; }
.cv-title { font-size:28px; color:#f5edd8; letter-spacing:2px; font-weight:300; margin-bottom:8px; }
.cv-title em { color:var(--gold); font-weight:700; font-style:normal; }
.cv-sub { font-size:13px; color:rgba(245,237,216,0.6); margin-bottom:30px; }

/* 8개 버튼 그리드 시스템 (가로 2 + 정사각 6) */
.cv-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; }
.cv-btn {
  position:relative; width:100%; aspect-ratio:1/1;
  border-radius:20px; overflow:hidden; border:none; cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,0.4); background:#1a2456;
}
.cv-btn.wide { grid-column:span 2; aspect-ratio:2.4/1; }

.cv-btn img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; filter:brightness(0.7); transition:transform 0.3s;
}
.cv-btn:active img { transform:scale(1.05); }
.cv-btn span {
  position:absolute; bottom:15px; left:0; right:0;
  color:white; font-weight:700; font-size:16px;
  text-shadow:0 2px 6px rgba(0,0,0,0.9); z-index:2; text-align:center;
}

/* 기존 v12의 하단 바/지도 UI 최소한의 유지 (기존 코드와 호환) */
#app { display:none; position:fixed; inset:0; z-index:1; }
html.app-active #app { display:block; }
</style>
</head>
<body>

<div id="cover">
  <div class="cv-inner">
    <h1 class="cv-title">천주교 <em>성지순례</em></h1>
    <p class="cv-sub">전국의 성지와 성당 정보를 확인하세요</p>
    
    <div class="cv-grid">
      <button class="cv-btn wide" onclick="startApp('trail')">
        <img src="순례길.jpg"><span>순례길 코스</span>
      </button>
      <button class="cv-btn wide" onclick="startApp('shrine')">
        <img src="성지순례.jpg"><span>전국 성지순례</span>
      </button>
      <button class="cv-btn" onclick="startApp('nearby')">
        <img src="내 주변 성당찾기.jpg"><span>내 주변 성당</span>
      </button>
      <button class="cv-btn" onclick="startApp('parish')">
        <img src="교구성당.jpg"><span>교구별 성당</span>
      </button>
      <button class="cv-btn" onclick="startApp('retreat')">
        <img src="수도원.jpg"><span>수도원/피난처</span>
      </button>
      <button class="cv-btn" onclick="startApp('missa')">
        <img src="미사시간.jpg"><span>미사 시간</span>
      </button>
      <button class="cv-btn" onclick="startApp('web')">
        <img src="가톨릭정보.jpg"><span>가톨릭 정보</span>
      </button>
      <button class="cv-btn" onclick="startApp('set')">
        <img src="설정.jpg"><span>설정</span>
      </button>
    </div>
  </div>
</div>

<div id="app">
  </div>

<script>
/* 2. 실행 로직: 표지 버튼과 v12 기능을 '진짜'로 연결하는 코드 */
function startApp(mode) {
  // 표지 닫기
  document.documentElement.classList.add('app-active');
  
  // v12 원본 파일에 정의된 함수들을 찾아 실행 (데이터 유실 없음)
  try {
    if (mode === 'trail') {
      if (typeof showTrailModule === 'function') showTrailModule();
    } else if (mode === 'nearby') {
      if (typeof showNearbyParish === 'function') showNearbyParish();
    } else if (mode === 'missa') {
      if (typeof openMissaWeb === 'function') openMissaWeb();
    } else if (mode === 'web') {
      if (typeof showWebModule === 'function') showWebModule();
    } else if (mode === 'set') {
      if (typeof showSettings === 'function') showSettings();
    } else {
      // shrine, parish, retreat 등 일반 페이지 이동
      if (typeof showPage === 'function') showPage(mode);
    }
  } catch (e) {
    console.error("기능 연결 오류:", e);
    alert("앱 기능을 불러오는 중 오류가 발생했습니다.");
  }
}

/* 여기에 기존 '가톨릭앱_v12_통합본.html' 파일의 
  5000줄이 넘는 방대한 script(카카오맵, 장소 데이터 등)를 
  그대로 붙여넣으시면 됩니다. 
*/
</script>
</body>
</html>
