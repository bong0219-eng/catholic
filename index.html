<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성지 지도</title>

  <!-- ✅ 카카오맵 SDK (안정 로딩 방식) -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0&autoload=false"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>
  // ✅ SDK 완전히 로드된 후 실행 (핵심!)
  kakao.maps.load(function () {

    var mapContainer = document.getElementById('map');

    var mapOption = {
      center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울 기준
      level: 7
    };

    var map = new kakao.maps.Map(mapContainer, mapOption);

    // ✅ 예시 마커 (정상 동작 확인용)
    var markerPosition = new kakao.maps.LatLng(37.565, 127.007);

    var marker = new kakao.maps.Marker({
      position: markerPosition
    });

    marker.setMap(map);

  });
</script>

</body>
</html>
