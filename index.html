<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 앱 메인 화면</title>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    :root {
        --color-1: #FF6B6B; /* 매일미사 - Red */
        --color-2: #FCA311; /* 주요기도문 - Orange */
        --color-3: #2EC4B6; /* 성지순례 - Teal */
        --color-4: #3A86FF; /* 성당찾기 - Blue */
        --color-5: #9D4EDD; /* 피정의 집 - Purple */
        --color-6: #8A817C; /* 순례길 - Brown/Grey */
        --color-7: #06D6A0; /* 웹사이트 - Green */
        --color-8: #E0A96D; /* 관구교구 - Gold/Tan */
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Pretendard', sans-serif;
        background-color: #0e1535; /* 앱 기본 배경색 네이비 유지 */
        color: #ffffff;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden; /* 스크롤 방지 */
    }

    .header {
        flex: 0 0 auto;
        padding: 4vh 20px 2vh;
        text-align: center;
    }

    .title {
        font-size: clamp(20px, 6vw, 26px);
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .subtitle {
        font-size: clamp(11px, 3vw, 13px);
        font-weight: 300;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 8px;
    }

    .grid-container {
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 12px;
        padding: 0 20px 4vh;
        box-sizing: border-box;
    }

    .category-card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #ffffff;
        cursor: pointer;
        transition: transform 0.1s, background 0.2s;
    }

    .category-card:active {
        transform: scale(0.96);
        background: rgba(255, 255, 255, 0.15);
    }

    .icon-wrapper {
        width: clamp(36px, 10vw, 44px);
        height: clamp(36px, 10vw, 44px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
    }

    .icon-wrapper svg {
        width: 60%;
        height: 60%;
        fill: #ffffff;
    }

    .category-name {
        font-size: clamp(12px, 3.5vw, 15px);
        font-weight: 600;
        text-align: center;
        word-break: keep-all;
    }

    /* 각 카테고리별 고유 색상 적용 */
    #card-1 .icon-wrapper { background-color: var(--color-1); box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3); }
    #card-2 .icon-wrapper { background-color: var(--color-2); box-shadow: 0 4px 10px rgba(252, 163, 17, 0.3); }
    #card-3 .icon-wrapper { background-color: var(--color-3); box-shadow: 0 4px 10px rgba(46, 196, 182, 0.3); }
    #card-4 .icon-wrapper { background-color: var(--color-4); box-shadow: 0 4px 10px rgba(58, 134, 255, 0.3); }
    #card-5 .icon-wrapper { background-color: var(--color-5); box-shadow: 0 4px 10px rgba(157, 78, 221, 0.3); }
    #card-6 .icon-wrapper { background-color: var(--color-6); box-shadow: 0 4px 10px rgba(138, 129, 124, 0.3); }
    #card-7 .icon-wrapper { background-color: var(--color-7); box-shadow: 0 4px 10px rgba(6, 214, 160, 0.3); }
    #card-8 .icon-wrapper { background-color: var(--color-8); box-shadow: 0 4px 10px rgba(224, 169, 109, 0.3); }

</style>
</head>
<body>

    <div class="header">
        <div class="subtitle">KOREA CATHOLIC GUIDE</div>
        <div class="title">대한민국 가톨릭 구석구석</div>
    </div>

    <div class="grid-container">
        <!-- 1 -->
        <div id="card-1" class="category-card" onclick="handleNavigation('mass')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M11,7V11H7V13H11V17H13V13H17V11H13V7H11Z" /></svg></div>
            <span class="category-name">매일미사</span>
        </div>
        <!-- 2 -->
        <div id="card-2" class="category-card" onclick="handleNavigation('prayers')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M14,10H19.5L14,4.5V10M5,3H15L21,9V19A2,2 0 0,1 19,21H5C3.89,21 3,20.1 3,19V5C3,3.89 3.89,3 5,3M12,6V10H9V12H12V18H14V12H17V10H14V6H12Z" /></svg></div>
            <span class="category-name">주요기도문</span>
        </div>
        <!-- 3 -->
        <div id="card-3" class="category-card" onclick="handleNavigation('pilgrimage')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M12,2C15.86,2 19,5.13 19,9C19,14.25 12,22 12,22C12,22 5,14.25 5,9A7,7 0 0,1 12,2M12,4A5,5 0 0,0 7,9C7,12.09 10.5,17.43 12,19.5C13.5,17.43 17,12.09 17,9A5,5 0 0,0 12,4M12,6.5A2.5,2.5 0 0,1 14.5,9A2.5,2.5 0 0,1 12,11.5A2.5,2.5 0 0,1 9.5,9A2.5,2.5 0 0,1 12,6.5Z" /></svg></div>
            <span class="category-name">성지순례 167곳</span>
        </div>
        <!-- 4 -->
        <div id="card-4" class="category-card" onclick="handleNavigation('churches')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M12,3L1,9L3,10.18V21H21V10.18L23,9L12,3M12,5.24L18,8.5V19H14V13H10V19H6V8.5L12,5.24Z" /></svg></div>
            <span class="category-name">내 주변 성당찾기</span>
        </div>
        <!-- 5 -->
        <div id="card-5" class="category-card" onclick="handleNavigation('retreats')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M17,18H7V16H17V18M17,14H7V12H17V14M17,10H7V8H17V10M19,4H5A2,2 0 0,0 3,6V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V6A2,2 0 0,0 19,4M19,20H5V6H19V20Z" /></svg></div>
            <span class="category-name">피정의 집 찾기</span>
        </div>
        <!-- 6 -->
        <div id="card-6" class="category-card" onclick="handleNavigation('trails')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M13.5,5.5C13.5,6.33 12.83,7 12,7C11.17,7 10.5,6.33 10.5,5.5C10.5,4.67 11.17,4 12,4C12.83,4 13.5,4.67 13.5,5.5M10.14,21.5H8.05L10.23,12L7.91,12.72L7,15.5H5L6.2,11.5L10.73,9.82C11.05,9.72 11.41,9.78 11.66,10C12.44,10.63 13.43,11.64 14.64,13.06L18.06,12.6V15.5L13.88,16L12.55,11.64L11.5,15.65L12.4,21.5H10.14Z" /></svg></div>
            <span class="category-name">가톨릭 순례길</span>
        </div>
        <!-- 7 -->
        <div id="card-7" class="category-card" onclick="handleNavigation('websites')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M16.36,14C16.44,13.34 16.5,12.68 16.5,12C16.5,11.32 16.44,10.66 16.36,10H19.74C19.9,10.64 20,11.31 20,12C20,12.69 19.9,13.36 19.74,14M14.59,19.56C15.19,18.45 15.65,17.25 15.97,16H18.92C17.96,17.65 16.43,18.93 14.59,19.56M14.34,14H9.66C9.56,13.34 9.5,12.68 9.5,12C9.5,11.32 9.56,10.66 9.66,10H14.34C14.43,10.66 14.5,11.32 14.5,12C14.5,12.68 14.43,13.34 14.34,14M12,19.96C11.16,18.76 10.5,17.43 10.09,16H13.91C13.5,17.43 12.84,18.76 12,19.96M8.03,16H5.08C6.04,17.65 7.57,18.93 9.41,19.56C8.81,18.45 8.35,17.25 8.03,16M4.26,14C4.1,13.36 4,12.69 4,12C4,11.31 4.1,10.64 4.26,10H7.64C7.56,10.66 7.5,11.32 7.5,12C7.5,12.68 7.56,13.34 7.64,14M5.08,8H8.03C8.35,6.75 8.81,5.55 9.41,4.44C7.57,5.07 6.04,6.35 5.08,8M9.41,4.44C8.81,5.55 8.35,6.75 8.03,8H5.08C6.04,6.35 7.57,5.07 9.41,4.44M12,4.04C12.84,5.24 13.5,6.57 13.91,8H10.09C10.5,6.57 11.16,5.24 12,4.04M14.59,4.44C15.19,5.55 15.65,6.75 15.97,8H18.92C17.96,6.35 16.43,5.07 14.59,4.44Z" /></svg></div>
            <span class="category-name">주요 가톨릭 웹사이트</span>
        </div>
        <!-- 8 -->
        <div id="card-8" class="category-card" onclick="handleNavigation('provinces')">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" /></svg></div>
            <span class="category-name">관구·교구 알아보기</span>
        </div>
    </div>

    <script>
        // 버튼 클릭 시 실행될 기능 (앱의 실제 로직으로 연결)
        function handleNavigation(categoryId) {
            // 여기에 실제 앱의 카테고리 이동 로직을 연결하세요.
            // 예: window.location.href = '/' + categoryId;
            // 현재는 직관적으로 동작을 확인할 수 있도록 알림창을 띄웁니다.
            
            const categoryNames = {
                'mass': '매일미사',
                'prayers': '주요기도문',
                'pilgrimage': '성지순례 167곳',
                'churches': '내 주변 성당찾기',
                'retreats': '피정의 집 찾기',
                'trails': '가톨릭 순례길',
                'websites': '주요 가톨릭 웹사이트',
                'provinces': '관구·교구 알아보기'
            };
            
            alert(categoryNames[categoryId] + ' 메뉴로 이동합니다.');
        }
    </script>
</body>
</html>
