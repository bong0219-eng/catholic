<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-visual">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한국천주교">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1535">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="한국 천주교 성지순례 지도 · 성당 찾기">
<title>한국 천주교</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230e1535'/><text y='.9em' font-size='90' x='10'>✝</text></svg>">
<link rel="icon" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230e1535'/><text x='6' y='26' font-size='24' fill='%23d4aa6a'>✝</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --navy:#0e1535; --navy2:#1a2456; --navy3:#243070;
  --gold:#d4aa6a; --gold2:#b8965a;
  --cream:#f5f0e8; --ink:#1a2456; --border:#dde3f2;
  --shrine:#c0392b; --pilgrim:#1565c0; --martyr:#1b7a3e;
  --parish-bg:#2e1f0e; --parish-accent:#8b5e3c;
  --tab-h:52px;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--navy);font-family:'Noto Sans KR',sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(26,36,86,.15);border-radius:2px}

#cover{
  position:fixed;inset:0;z-index:9999;background:#0e1535;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:env(safe-area-inset-top,0px) 20px env(safe-area-inset-bottom,0px);
  overflow:hidden;
}
.cv-bg{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(45,58,122,.65) 0%,transparent 65%),
    linear-gradient(180deg,#1a2456 0%,#0e1535 100%);}
.cv-stars{position:absolute;inset:0;pointer-events:none;}
.cv-star{position:absolute;border-radius:50%;background:#fff9d0;box-shadow:0 0 5px 2px rgba(255,240,160,.7);
  animation:cv-twinkle 3s ease-in-out infinite alternate;}
@keyframes cv-twinkle{from{opacity:.2}to{opacity:1}}
.cv-wave{position:absolute;bottom:0;left:0;right:0;height:100px;
  background:linear-gradient(to bottom,transparent,rgba(14,21,53,.7));pointer-events:none;}
.cv-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:0 16px 20px;max-width:540px;width:100%;}
.cv-orn{display:flex;align-items:center;gap:18px;margin-bottom:22px;}
.cv-orn-line{height:1px;width:56px;background:linear-gradient(90deg,transparent,#d4aa6a);}
.cv-orn-line.r{background:linear-gradient(270deg,transparent,#d4aa6a);}
.cv-cross{font-size:36px;color:#d4aa6a;filter:drop-shadow(0 0 10px rgba(212,170,106,.55));}
.cv-title{font-size:clamp(26px,6.5vw,48px);font-weight:300;letter-spacing:3px;line-height:1.55;color:#f5edd8;margin-bottom:8px;}
.cv-title em{font-style:normal;color:#d4aa6a;font-weight:700;}
.cv-sub{font-size:13px;color:rgba(245,237,216,.72);letter-spacing:1.5px;margin-bottom:4px;}
.cv-div{width:38px;height:1px;background:#b8965a;margin:16px auto 24px;}
.cv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px;}
.cv-btn{padding:20px 12px;border:none;border-radius:16px;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;}
.cv-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);}
.cv-btn:active{transform:scale(.97);}
.cv-btn-icon{font-size:30px;line-height:1;}
.cv-btn-label{font-size:14px;font-weight:700;letter-spacing:.3px;word-break:keep-all;text-align:center;line-height:1.4;}
.cv-btn-desc{font-size:10px;opacity:.72;font-weight:400;line-height:1.55;word-break:keep-all;text-align:center;}
.cv-btn-shrine{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#e8f0fe;
  box-shadow:0 6px 26px rgba(21,101,192,.45),inset 0 1px 0 rgba(255,255,255,.1);}
.cv-btn-parish{background:linear-gradient(135deg,#4a3728,#2e2018);color:#e8ddd0;
  box-shadow:0 6px 22px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.08);
  border:1px solid rgba(212,170,106,.2);}
.cv-footer{position:absolute;bottom:calc(16px + env(safe-area-inset-bottom,0px));left:0;right:0;text-align:center;z-index:2;}
.cv-footer-txt{font-size:11px;color:rgba(212,170,106,.45);letter-spacing:1.5px;}

#cv-pull{position:absolute;top:calc(env(safe-area-inset-top,0px) + 8px);
  left:50%;transform:translateX(-50%) translateY(-48px);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:rgba(212,170,106,.7);font-size:12px;font-weight:600;
  transition:transform .2s,opacity .2s;opacity:0;pointer-events:none;z-index:3;}
#cv-pull-arrow{font-size:20px;transition:transform .25s;}
#cv-pull.visible{opacity:1;transform:translateX(-50%) translateY(0);}
#cv-pull.ready #cv-pull-arrow{transform:rotate(180deg);}

#app{display:none;position:fixed;inset:0;}
html.app-active #cover{display:none!important;}
html.app-active #app{display:block;}

#tabbar{
  position:fixed;top:0;left:0;right:0;
  height:calc(var(--tab-h) + env(safe-area-inset-top,0px));
  padding-top:env(safe-area-inset-top,0px);
  background:var(--navy);display:flex;z-index:950;
  border-bottom:2px solid var(--gold);
  transform:translateZ(0);
}
html.parish-mode #tabbar{background:var(--parish-bg);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:none;border:none;color:rgba(255,255,255,.45);font-size:12px;font-weight:600;
  font-family:inherit;cursor:pointer;padding:4px 0;gap:2px;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:background .15s,color .15s;}
.tab-btn.active{color:var(--gold);background:rgba(212,170,106,.18);
  border-bottom:3px solid var(--gold);font-weight:800;}
.tab-icon{font-size:20px;line-height:1;}
.tab-btn.active .tab-icon{font-size:22px;}

#map-wrap{
  position:fixed;
  top:calc(var(--tab-h) + env(safe-area-inset-top,0px));
  left:0;right:0;bottom:0;
}
#map{width:100%;height:100%;}

#loc-btn{
  position:absolute;right:12px;
  bottom:calc(18px + env(safe-area-inset-bottom,0px));
  height:36px;background:#fff;border-radius:18px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);border:none;cursor:pointer;
  font-size:13px;font-weight:700;color:#1565c0;
  display:flex;align-items:center;gap:4px;padding:0 12px;
  z-index:400;font-family:inherit;
}
#legend{
  position:absolute;left:12px;
  bottom:calc(18px + env(safe-area-inset-bottom,0px));
  background:rgba(255,255,255,.95);border-radius:10px;
  padding:8px 12px;z-index:400;font-size:11px;border:1px solid #e8e8e8;
}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.leg-row:last-child{margin-bottom:0;}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
#route-guide{
  display:none;position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:8px 18px;border-radius:22px;
  font-size:13px;font-weight:700;z-index:500;white-space:nowrap;
  border:1px solid rgba(212,170,106,.4);pointer-events:none;
}
#route-guide.on{display:block;}

.sheet{
  position:fixed;
  top:calc(var(--tab-h) + env(safe-area-inset-top,0px));
  left:0;right:0;bottom:0;
  background:#fff;z-index:800;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  overflow:hidden;will-change:transform;
}
.sheet.open{transform:translateY(0);}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;}

/* 길찾기 시트: 지4목록 — 인포카드와 동일한 bottom-anchored compact */
#sheet-route{
  top: auto !important;
  max-height: 52vh;
  border-radius: 16px 16px 0 0;
  border-top: 2px solid var(--gold2);
  box-shadow: 0 -3px 16px rgba(0,0,0,.25);
  padding-bottom: env(safe-area-inset-bottom,0px);
  overflow-y: auto;
}

.srch-bar{padding:8px 12px 6px;background:var(--navy2);flex-shrink:0;}
html.parish-mode .srch-bar{background:#3d2a14;}
.srch-inner{display:flex;align-items:center;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);border-radius:22px;padding:0 14px;height:38px;}
.srch-inner input{flex:1;background:none;border:none;outline:none;
  font-size:15px;color:#fff;font-family:inherit;}
.srch-inner input::placeholder{color:rgba(255,255,255,.4);}
.srch-x{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:0;display:none;}
.filter-bar{display:flex;overflow-x:auto;gap:6px;padding:7px 12px;
  background:var(--navy2);flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.08);scrollbar-width:none;}
html.parish-mode .filter-bar{background:#3d2a14;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 13px;border-radius:16px;
  border:1px solid rgba(212,170,106,.3);background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.7);font-size:12px;font-weight:600;font-family:inherit;
  cursor:pointer;white-space:nowrap;}
.filter-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}

.dio-hd{padding:7px 14px 5px;font-size:11px;font-weight:700;letter-spacing:.1em;
  background:#f8f9fc;border-bottom:1px solid #eee;position:sticky;top:0;z-index:1;
  color:var(--pilgrim);}
.list-item{padding:12px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;
  display:flex;align-items:center;gap:10px;}
.list-item:active{background:#f0f5ff;}
.li-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:15px;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:12px;color:#888;margin-top:2px;}
.li-badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;}

/* 내주변 리스트 */
.nearby-item{display:flex;align-items:center;gap:10px;padding:12px 14px;
  border-bottom:1px solid #eef0f6;cursor:pointer;background:#fff;}
.nearby-item:active{background:#f0f5ff;}
.nearby-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.nearby-info{flex:1;min-width:0;}
.nearby-name{font-size:15px;font-weight:700;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.nearby-addr{font-size:12px;color:#888;line-height:1.3;margin-top:2px;}
.nearby-meta{text-align:right;flex-shrink:0;line-height:1.6;min-width:68px;}
.nearby-type{font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;}
.nearby-dist{font-size:13px;color:#7a4f00;font-weight:700;margin-top:4px;}

/* 지역검색 */
.region-wrap{padding:10px 12px 8px;background:var(--navy2);flex-shrink:0;}
html.parish-mode .region-wrap{background:#3d2a14;}
.region-row{display:flex;gap:8px;align-items:center;}
.region-search-btn{padding:0 14px;height:38px;border-radius:19px;border:none;
  background:var(--gold);color:var(--navy);font-size:12px;font-weight:800;
  font-family:inherit;cursor:pointer;flex-shrink:0;}
.region-item{display:flex;align-items:center;gap:10px;padding:12px 14px;
  border-bottom:1px solid #eef0f6;cursor:pointer;background:#fff;}
.region-item:active{background:#f0f5ff;}

#info-card{
  display:none;position:fixed;
  bottom:0;left:0;right:0;
  background:#fff;z-index:860;
  border-top:2px solid var(--gold2);
  border-radius:16px 16px 0 0;
  max-height:52vh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  box-shadow:0 -3px 16px rgba(0,0,0,.25);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#info-card.open{display:block;}

/* Row1: 이름 + X */
.ic-header{display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px 6px;}
.ic-name{font-size:19px;font-weight:700;color:var(--ink);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ic-close-btn{background:#f0f0f0;border:none;border-radius:50%;
  width:30px;height:30px;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;}

/* Row2: 교구(left) + 유형(right) 같은 줄 */
.ic-meta{display:flex;align-items:center;justify-content:space-between;
  padding:0 14px 8px;}
.ic-sub{font-size:13px;color:var(--gold2);font-weight:600;}
.ic-type-badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:10px;
  background:#f0f0f0;color:#555;white-space:nowrap;flex-shrink:0;}

/* Row3: 주소(좌) + 내위치거리(우) */
.ic-addr-row{display:flex;align-items:flex-start;gap:10px;padding:0 14px 10px;border-bottom:1px solid #f0f0f0;}
.ic-addr-left{flex:1;min-width:0;}
.ic-addr-lbl{font-size:12px;color:#aaa;font-weight:600;margin-bottom:2px;}
.ic-addr-val{font-size:14px;color:var(--ink);word-break:keep-all;line-height:1.45;}
.ic-dist-col{display:none;flex-direction:column;align-items:flex-end;flex-shrink:0;min-width:80px;}
.ic-dist-lbl{font-size:10px;color:#aaa;font-weight:600;margin-bottom:4px;white-space:nowrap;}
.ic-dist-box{font-size:14px;font-weight:800;color:#7a4f00;
  background:#fff3d0;padding:6px 10px;border-radius:9px;
  border:1.5px solid rgba(180,110,0,.35);white-space:nowrap;text-align:center;}

/* Row4: 전화+길찾기 or 길찾기 */
.ic-btn-row{display:flex;gap:7px;padding:10px 14px 0;}
.ic-tel-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  text-decoration:none;background:#f0f7ff;border:1.5px solid #c5d9f5;
  border-radius:10px;padding:10px 8px;font-size:14px;font-weight:700;color:#1565c0;}
.ic-tel-icon{font-size:18px;}
.ic-tel{font-size:14px;font-weight:800;color:#1565c0;}
.ic-route-btn{flex:1;background:#1565c0;color:#fff;border:none;border-radius:10px;
  padding:10px 8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;}

/* Row5: 홈페이지+상세 */
.ic-links{display:flex;gap:6px;}
.ic-link-btn{flex:1;padding:9px 6px;border-radius:10px;
  font-size:13px;font-weight:700;text-align:center;cursor:pointer;
  font-family:inherit;white-space:nowrap;text-decoration:none;
  display:flex;align-items:center;justify-content:center;}
.ic-hp-btn{background:#1b7a3e;color:#fff;border:none;}
.ic-guide-btn{background:var(--cream);color:#8b6914;border:1px solid #ddd3b0;}

/* Row6: 카카오맵 */
.btn-kakao-nav{display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;font-family:inherit;
  background:#FEE500;color:#3A1D1D;width:100%;}
.btn-kakao-nav:active{opacity:.85;}

/* 인포카드 body 패딩 */
.ic-body{padding:0 0 14px;}

.rs-start-box,.rs-end-box{display:flex;align-items:center;gap:8px;padding:11px 12px;
  border:1.5px solid var(--border);cursor:pointer;background:#fff;border-radius:10px;min-height:46px;}
.rs-start-box{background:#f0f5ff;border-color:#1565c0;}
.rs-end-box{background:#fff5f5;border-color:#c0392b;}
.rs-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rs-lbl{flex:1;font-size:14px;color:#555;font-weight:500;}
.rs-lbl.filled{color:var(--ink);font-weight:700;}
.rs-lbl.empty{color:#aaa;}
.rs-myloc{background:none;border:1px solid var(--border);border-radius:14px;
  padding:6px 11px;font-size:12px;color:var(--pilgrim);cursor:pointer;
  font-family:inherit;white-space:nowrap;}
.rs-x{background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;padding:0;}
.rs-swap-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);
  background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.rs-result{background:#fff;border-radius:12px;padding:12px;
  border:1.5px solid var(--border);box-shadow:0 2px 10px rgba(14,21,53,.08);}
.rs-stats{display:flex;gap:8px;margin-bottom:10px;}
.rs-stat{flex:1;background:var(--navy);border-radius:10px;padding:13px 8px;text-align:center;}
.rs-stat-lbl{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px;letter-spacing:.03em;}
.rs-stat-val{font-size:24px;font-weight:900;color:#fff;line-height:1;}
.rs-stat-unit{font-size:14px;color:rgba(255,255,255,.75);font-weight:600;}
.rs-note{font-size:12px;color:#7a4f00;margin-bottom:6px;display:none;
  background:#fff8e1;border-left:3px solid #f39c12;border-radius:6px;
  padding:7px 10px;line-height:1.6;}
.rs-hint{font-size:14px;color:#aaa;text-align:center;padding:16px 0;line-height:1.8;}
.route-btns{display:flex;gap:8px;margin-top:8px;}
.btn-kakao-route{flex:1;padding:12px 6px;border-radius:10px;border:none;
  background:#FEE500;color:#111;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-route-reset{flex:1;padding:12px 6px;border-radius:10px;
  border:1.5px solid var(--border);background:#fff;font-size:14px;
  color:var(--ink);cursor:pointer;font-family:inherit;font-weight:600;}

#srch-modal{display:none;position:fixed;inset:0;z-index:950;
  background:rgba(14,21,53,.75);backdrop-filter:blur(4px);
  align-items:stretch;justify-content:stretch;overscroll-behavior:none;}
#srch-modal.open{display:flex;}
.sm-inner{background:#fff;border-radius:0;width:100%;
  flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sm-hd{background:var(--navy);padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sm-title{font-size:13px;font-weight:700;color:var(--gold);}
.sm-x{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:50%;color:rgba(212,170,106,.7);font-size:16px;font-weight:900;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sm-filter{display:flex;overflow-x:auto;gap:5px;padding:7px 12px;
  background:var(--navy2);flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.08);scrollbar-width:none;}
.sm-filter::-webkit-scrollbar{display:none;}
.sm-fb{flex-shrink:0;padding:4px 11px;border-radius:14px;
  border:1px solid rgba(212,170,106,.3);background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.7);font-size:11px;font-weight:600;font-family:inherit;
  cursor:pointer;white-space:nowrap;}
.sm-fb.on{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.sm-srch{padding:8px 12px 6px;flex-shrink:0;border-bottom:1px solid #f0f0f0;}
.sm-si{display:flex;align-items:center;background:#f5f6f8;

.sm-si span{font-size:14px;opacity:.4;margin-right:8px;}

.sm-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

#exit-dlg{display:none;position:fixed;inset:0;z-index:99999;

  align-items:center;justify-content:center;}
#exit-dlg.open{display:flex;}
.exit-box{background:#fff;border-radius:16px;padding:28px 24px 20px;

.exit-box h3{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.exit-box p{font-size:13px;color:#666;line-height:1.6;margin-bottom:22px;}
.exit-btns{display:flex;gap:10px;}
.exit-cancel{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;}
.exit-ok{flex:1;padding:12px;border-radius:10px;border:none;

.region-info-card{margin:12px 14px 14px;background:#fff;border-radius:14px;overflow:hidden;

.ric-hd{background:linear-gradient(135deg,#0e1535,#1a2456);
  padding:12px 14px;display:flex;align-items:center;gap:10px;}
html.parish-mode .ric-hd{background:linear-gradient(135deg,#2e1f0e,#4a3728);}
.ric-icon{width:38px;height:38px;border-radius:50%;background:rgba(212,170,106,.15);
  border:1.5px solid rgba(212,170,106,.4);display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0;}
.ric-name-wrap{flex:1;min-width:0;}
.ric-name{font-size:15px;font-weight:800;color:var(--gold);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ric-cat{font-size:10px;color:rgba(212,170,106,.6);margin-top:1px;}
.ric-map-link{flex-shrink:0;padding:6px 10px;background:rgba(212,170,106,.15);
  border:1px solid rgba(212,170,106,.4);border-radius:8px;
  font-size:10px;font-weight:700;color:var(--gold);text-decoration:none;}
.ric-body{padding:9px 14px 10px;background:#f5f7fc;display:flex;flex-direction:column;gap:4px;}
.ric-row{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:#555;}
.ric-lbl{color:var(--pilgrim);font-weight:700;flex-shrink:0;}
html.parish-mode .ric-lbl{color:var(--parish-accent);}
.region-list-hd{padding:8px 16px;font-size:11px;font-weight:700;
  color:var(--pilgrim);background:#f8f9fc;
  border-top:1px solid #eee;border-bottom:1px solid #eee;letter-spacing:.04em;}
html.parish-mode .region-list-hd{color:var(--parish-accent);}

.map-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--navy);height:100%;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.map-loading-icon{font-size:36px;margin-bottom:14px;animation:spin 2s linear infinite;}
.map-loading-txt{font-size:13px;color:rgba(212,170,106,.8);font-weight:600;}

@keyframes pwa-pulse{0%,100%{box-shadow:0 0 18px rgba(212,170,106,.35)}
  50%{box-shadow:0 0 28px rgba(212,170,106,.7)}}
#cv-install-wrap{display:none;margin-bottom:16px;}
.cv-install-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;

  background:linear-gradient(135deg,rgba(212,170,106,.25),rgba(212,170,106,.1));
  color:var(--gold);font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;
  backdrop-filter:blur(8px);animation:pwa-pulse 2s ease-in-out infinite;}

</style>
</head>

<body>

<div id="exit-dlg">
  <div class="exit-box">

</div>

<div id="cover">

      <div class="cv-cross">✞</div>
      <div class="cv-orn-line r"></div>
    </div>
    <h1 class="cv-title">한국 천주교<br><em>순례 지도</em></h1>
    <p class="cv-sub">성지 · 성당 · 피정 · 순례길</p>
    <div class="cv-div"></div>
    <div class="cv-grid">
      <button class="cv-btn cv-btn-shrine" onclick="startApp('shrine')">
        <span class="cv-btn-icon">✝</span>
        <span class="cv-btn-label">성지순례<br>스탬프 167</span>
        <span class="cv-btn-desc">카카오맵 · 경로탐색<br>내 주변 성지 찾기</span>
      </button>
      <button class="cv-btn cv-btn-parish" onclick="startApp('parish')">
        <span class="cv-btn-icon">⛪</span>
        <span class="cv-btn-label">내 주변<br>성당 찾기</span>
        <span class="cv-btn-desc">전국 1,696개 성당<br>교구별 검색 · 전화</span>
      </button>
    </div>
  </div>
  <div class="cv-footer">
    <div id="cv-install-wrap">
      <button class="cv-install-btn" onclick="cvInstall()">
        📲 <span id="cv-install-txt">홈 화면에 앱 설치</span>
      </button>
    </div>
    <p class="cv-footer-txt">성지 167곳 · 성당 1,696개 · 16교구</p>
  </div>
</div>

<div id="app">

    </div>
    <div class="filter-bar" id="list-filter-bar">

      <button class="filter-btn" onclick="setDioFilter('수원교구',this)">수원</button>

      <button class="filter-btn" onclick="setDioFilter('춘천교구',this)">춘천</button>
      <button class="filter-btn" onclick="setDioFilter('원주교구',this)">원주</button>
      <button class="filter-btn" onclick="setDioFilter('대전교구',this)">대전</button>
      <button class="filter-btn" onclick="setDioFilter('청주교구',this)">청주</button>
      <button class="filter-btn" onclick="setDioFilter('대구대교구',this)">대구</button>

      <button class="filter-btn" onclick="setDioFilter('부산교구',this)">부산</button>

      </div>
    </div>
  </div>

      <div style="display:flex;align-items:stretch;gap:0;">

</div>

let _regionCache  = [];  // 지역검색 캐시
let _regionLat=null, _regionLng=null, _regionName='', _regionPlaceName='';
let _filterDio = 'all', _listSrch = '';
let _routeMode = false, _rS=null, _rE=null, _polyline=null;
let _smRole='start', _smDio='all';
let _kakaoLaunching=false;
let _mapInited=false;
let _curInfoItem = null; // 현재 인포카드 아이템
let _curFromRegion = false; // 인포카드가 지역검색에서 열렸는지 여부
let _dp = null; // PWA install prompt

// ─── 키보드 감지 (탭바 유지, 시트만 조정) ────────
(function(){
  if(!window.visualViewport) return;
  let _kbOpen=false;
  window.visualViewport.addEventListener('resize',()=>{
    const ratio = window.visualViewport.height / window.innerHeight;
    const isKb = ratio < 0.75;
    if(isKb===_kbOpen) return;
    _kbOpen=isKb;
    // 키보드 열릴 때 시트를 visualViewport 높이에 맞춤
    if(isKb){
      document.documentElement.classList.add('kb-open');
    } else {
      document.documentElement.classList.remove('kb-open');
    }
  });
})();

// ─── safe area 측정 ──────────────────────────────
(function(){
  function measureSA(){
    const b=document.createElement('div');
    b.style.cssText='position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;';
    document.body.appendChild(b);
    const sb=b.offsetHeight||0;
    document.body.removeChild(b);
    if(sb>0) document.documentElement.style.setProperty('--sb',sb+'px');
  }
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',measureSA):measureSA();
  window.addEventListener('resize',measureSA);
})();

// ─── 별 생성 ────────────────────────────────────
(function(){
  const c=document.getElementById('cv-stars');
  if(!c) return;
  for(let i=0;i<22;i++){
    const s=document.createElement('span');
    s.className='cv-star';
    const sz=Math.random()*4+2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(Math.random()*3).toFixed(1)}s;animation-duration:${(2+Math.random()*3).toFixed(1)}s;`;
    c.appendChild(s);
  }
})();

// ─── PWA 설치 ────────────────────────────────────
(function(){
  if(window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches) return;
  if(/iphone|ipad|ipod/i.test(navigator.userAgent)){
    // iOS: 안내만 표시
    return;
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    _dp=e;
    const w=document.getElementById('cv-install-wrap');
    if(w) w.style.display='block';
  });
  window.addEventListener('appinstalled',()=>{
    _dp=null;
    const w=document.getElementById('cv-install-wrap');
    if(w) w.style.display='none';
  });
})();

function cvInstall(){
  if(_dp){ _dp.prompt(); _dp.userChoice.then(()=>{_dp=null;}); }
}

// ─── 뒤로가기 스택 ─────────────────────────────
(function(){
  try{history.replaceState({a:'base'},'');history.pushState({a:'top'},'');}catch(e){}
  let _lock=false;
  window.addEventListener('popstate',()=>{
    try{history.pushState({a:Date.now()},'');}catch(e){}
    if(_kakaoLaunching) return;
    if(_lock) return;
    _lock=true;
    setTimeout(()=>{_lock=false;},300);
    _handleBack();
  });
})();

function _handleBack(){
  // 종료 다이얼로그
  if(document.getElementById('exit-dlg').classList.contains('open')){
    closeExitDlg(); return;
  }
  // 검색 모달
  if(document.getElementById('srch-modal').classList.contains('open')){
    closeSearchModal(); return;
  }
  // 인포카드
  if(document.getElementById('info-card').classList.contains('open')){
    closeInfoCard(); return;
  }
  // 시트
  if(_activeTab){
    closeTab(_activeTab); return;
  }
  // 경로 모드
  if(_routeMode||_rS||_rE){
    resetRoute(); _routeMode=false; return;
  }
  // 지도 → 표지
  if(_screen==='map'){
    goToCover(); return;
  }
  // 표지 → 종료 안내
  _showBackToast();
}

let _exitReady=false, _exitTimer=null;
function _showBackToast(){
  if(_exitReady){
    _exitReady=false;
    clearTimeout(_exitTimer);
    doExit(); return;
  }
  _exitReady=true;
  const old=document.getElementById('_bt');
  if(old) old.remove();
  const t=document.createElement('div');
  t.id='_bt';
  t.textContent='한 번 더 누르면 앱을 종료합니다';
  t.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+32px);left:50%;transform:translateX(-50%);background:rgba(14,21,53,.92);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:99999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.3);';
  document.body.appendChild(t);
  _exitTimer=setTimeout(()=>{_exitReady=false;if(t.parentNode)t.remove();},2500);
}

function closeExitDlg(){document.getElementById('exit-dlg').classList.remove('open');}
function doExit(){
  closeExitDlg();
  try{window.close();}catch(e){}
  setTimeout(()=>goToCover(),300);
}

// ─────────────────────────────────
//  앱 진입 / 표지
// ─────────────────────────────────

function startApp(mode){
  _mode=mode;
  _screen='map';
  document.getElementById('cover').style.display='none';
  document.documentElement.classList.add('app-active');
  document.documentElement.classList.toggle('parish-mode',mode==='parish');
  
  // 탭 라벨 (null-safe: 헤더 삭제된 id는 무시)
  const _setTxt=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  _setTxt('tab-nearby-lbl', mode==='parish'?'내주변':'내주변');
  _setTxt('tab-list-lbl',   mode==='parish'?'성당목록':'성지목록');
  
  // 범례: 성당 모드에서는 숨김
  document.getElementById('legend').style.display = mode==='parish'?'none':'block';

  if(!_mapInited){
    _mapInited=true;
    _loadMap();
  } else {
    if(_map) try{_map.relayout();}catch(e){}
    // 모드 전환 시 마커 처리
    if(mode==='shrine'){
      _clearParishMarkers();
      _restoreMapMarkers();
    } else {
      _clearShrineMarkers();
    }
    openTab('nearby');
  }
}

function goToCover(){
  closeTab(_activeTab);
  closeInfoCard();
  resetRoute();
  _screen='cover';
  document.getElementById('cover').style.display='';
  document.documentElement.classList.remove('app-active','parish-mode');
}

// ─────────────────────────────────
//  카카오맵 로딩
// ─────────────────────────────────

function _loadMap(){
  const wrap=document.getElementById('map');
  wrap.innerHTML='<div class="map-loading"><div class="map-loading-icon">✝</div><div class="map-loading-txt">지도를 불러오는 중...</div></div>';
  const sc=document.createElement('script');
  sc.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${JSKEY}&autoload=false`;
  const timer=setTimeout(()=>_mapError('카카오맵 로딩 시간 초과'),20000);
  sc.onload=()=>{clearTimeout(timer);try{kakao.maps.load(_onMapReady);}catch(e){_mapError(e.message);}};
  sc.onerror=()=>{clearTimeout(timer);_mapError(`도메인 등록 필요: ${location.hostname}`);};
  document.head.appendChild(sc);
}

function _mapError(msg){
  const m=document.getElementById('map');
  m.innerHTML=`<div class="map-loading"><div style="font-size:40px;margin-bottom:16px">🗺️</div><div style="font-size:15px;font-weight:700;color:var(--gold);margin-bottom:12px">지도를 불러올 수 없습니다</div><div style="font-size:12px;color:rgba(255,255,255,.7);line-height:1.8;max-width:280px;word-break:keep-all">${msg}</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:var(--gold);color:var(--navy);border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;">새로고침</button></div>`;
  // 마커 없이도 목록/검색 동작하게
  _markers=new Array(SHRINES.length).fill(null);
  renderList();
  openTab('nearby');
}

function _onMapReady(){
  _map=new kakao.maps.Map(document.getElementById('map'),{
    center:new kakao.maps.LatLng(36.2,127.9),level:8
  });
  _map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);
  kakao.maps.event.addListener(_map,'click',()=>{
    closeInfoCard();
    document.activeElement?.blur();
  });
  _buildShrineMarkers();
  renderList();
  _autoLocate();
  openTab('nearby');
}

// ─────────────────────────────────
//  탭 관리 (핵심 개선: 단순하고 통일)
// ─────────────────────────────────

function openTab(name){
  if(_activeTab===name) return;
  // 이전 탭 완전 종료 + 전체 리셋
  _closeSheetOnly(_activeTab);
  closeInfoCard();
  _curFromRegion=false;
  // 경로 리셋
  resetRoute();
  _exitRouteMode();
  // 내주변 마커 복원
  _restoreMapMarkers();
  _activeTab=name;
  document.getElementById('sheet-'+name)?.classList.add('open');
  _updateTabBtns(name);
  // 탭별 콘텐츠 로드
  if(name==='nearby')     _loadNearby();
  else if(name==='list')  renderList();
  else if(name==='region'){
    /* 사용자가 직접 탭할 때만 포커스 */
  }
  else if(name==='route') _enterRouteMode();
}

function closeTab(name){
  if(!name) return;
  _closeSheetOnly(name);
  if(_activeTab===name) _activeTab=null;
  _updateTabBtns(null);
  if(name!=='route') _restoreMapMarkers();
}

function _closeSheetOnly(name){
  if(!name) return;
  document.getElementById('sheet-'+name)?.classList.remove('open');
}

function closeAllTabs(){
  ['nearby','list','region','route'].forEach(n=>_closeSheetOnly(n));
  _activeTab=null;
  _updateTabBtns(null);
}

function toggleTab(name){
  if(_activeTab===name) closeTab(name);
  else openTab(name);
}

function _updateTabBtns(active){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===active);
  });
}

// ─────────────────────────────────
//  아이템 선택 - 핵심 수정 (모든 탭에서 동일 동작)
//
//  selectItem(idx, opts)
//    opts.fromNearby: true → 내주변 캐시 마커 유지
//    opts.fromRegion: true → 지역 캐시 마커 + 검색지 마커 유지
// ─────────────────────────────────

function selectItem(idx, opts={}){
  const items = _mode==='shrine' ? SHRINES : PARISHES;
  const item  = items[idx];
  if(!item) return;

  // fromRegion 추적
  _curFromRegion = !!(opts.fromRegion && _regionLat);

  // 1. ★ 핵심: 시트를 먼저 모두 닫는다
  closeAllTabs();

  // 2. 마커 처리
  if(_mode==='shrine'){
    // 내주변/지역검색에서 온 경우 해당 캐시 마커 유지, 아니면 전체 복원
    if(opts.fromNearby && _nearbyCache.length>0){
      _showItemsOnMap(_nearbyCache);
    } else if(opts.fromRegion && _regionCache.length>0){
      _showItemsOnMap(_regionCache);
    } else {
      _restoreMapMarkers();
    }
    _selectShrineMarker(idx);
  } else {
    _selectParishMarker(item);
  }

  // 3. 지도 이동 — 항상 선택 마커를 정중앙에
  if(_map && item.lat && item.lng){
    _map.setCenter(new kakao.maps.LatLng(item.lat, item.lng));
    if(!opts.fromNearby && !opts.fromRegion) _map.setLevel(9);
  }

  // 4. 인포카드 표시
  _showInfoCard(item, idx);
}

// ─────────────────────────────────
//  인포카드
// ─────────────────────────────────

function _showInfoCard(item, idx){
  _curInfoItem = {item, idx};
  
  document.getElementById('ic-name').textContent = item.name;
  document.getElementById('ic-sub').textContent  = item.diocese;
  document.getElementById('ic-type').textContent = _mode==='shrine' ? item.type : '성당';
  document.getElementById('ic-addr').textContent = item.addr;

  // 안내 노트 (죽림굴 등 특수 안내)
  let noteEl=document.getElementById('ic-note');
  if(!noteEl){
    noteEl=document.createElement('div');
    noteEl.id='ic-note';
    noteEl.style.cssText='margin:6px 14px 0;padding:8px 10px;background:#fff8e1;border-left:3px solid #f39c12;border-radius:6px;font-size:12px;color:#7a4f00;line-height:1.55;display:none;';
    document.getElementById('ic-addr').closest('.ic-addr-row').insertAdjacentElement('afterend', noteEl);
  }
  if(item.note){noteEl.textContent=item.note;noteEl.style.display='block';}
  else noteEl.style.display='none';

  // 전화 버튼 (ic-tel-btn)
  const telBtn=document.getElementById('ic-tel-link');
  const routeBtn=document.querySelector('.ic-route-btn');
  if(item.tel){
    document.getElementById('ic-tel').textContent=item.tel;
    telBtn.href='tel:'+item.tel.replace(/[^0-9+]/g,'');
    telBtn.style.display='flex';
  } else {
    telBtn.style.display='none';
  }

  // 거리 — 우측 박스 (API 완료 후)
  const distCol=document.getElementById('ic-dist-col');
  const distEl=document.getElementById('ic-dist');
  distCol.style.display='none';
  distEl.textContent='';
  if(_myLat && item.lat){
    const _snap=item;
    (async()=>{
      try{
        const res=await fetch(
          `https://apis-navi.kakaomobility.com/v1/directions?origin=${_myLng},${_myLat}&destination=${_snap.lng},${_snap.lat}&priority=RECOMMEND`,
          {headers:{Authorization:'KakaoAK '+REST}});
        if(!res.ok) throw new Error('fail');
        const data=await res.json();
        const route=data.routes?.[0];
        if(route&&route.result_code===0){
          const km=(route.summary.distance/1000).toFixed(1);
          if(_curInfoItem&&_curInfoItem.item===_snap){
            distEl.textContent=km+' km';
            distCol.style.display='flex';
          }
        }
      }catch(e){}
    })();
  }

  // 홈페이지
  const hp=document.getElementById('ic-hp');
  if(item.hp){hp.href=item.hp;hp.style.display='flex';}
  else hp.style.display='none';

  // 교회 안내
  const guide=document.getElementById('ic-guide');
  if(item.url){
    guide.onclick=()=>window.open(item.url,'_blank');
    guide.style.display='flex';
  } else {
    guide.style.display='none';
  }

  // 링크 row: 하나라도 있으면 표시
  const linksRow=document.getElementById('ic-links-row');
  if(linksRow) linksRow.style.display=(item.hp||item.url)?'flex':'none';

  document.getElementById('info-card').classList.add('open');
}

function closeInfoCard(){
  document.getElementById('info-card').classList.remove('open');
  _curInfoItem=null;
  _curFromRegion=false;
  if(_mode==='shrine') _clearShrineMarkerSel();
  else {
    if(_paSelMkr){try{_paSelMkr.setMap(null);}catch(e){}  _paSelMkr=null;}
  }
}

function openInAppRoute(){
  if(!_curInfoItem) return;
  const {item, idx}=_curInfoItem;
  if(!item.lat||!item.lng) return;

  function doRoute(spLat, spLng, spName){
    closeInfoCard();
    // 경로탐색 탭 열기
    openTab('route');
    // 출발: 지정 좌표, 도착: 선택 성지/성당
    _rS={idx:-1, name:spName, lat:spLat, lng:spLng};
    _rE={idx, name:item.name, lat:item.lat, lng:item.lng};
    _setRouteLabel('start', spName);
    _setRouteLabel('end', item.name);
    if(idx>=0&&_markers[idx])
      _markers[idx].marker.setImage(_mkrImgRoute(_typeColor(item.type),'도'));
    // 출발 마커 녹색 표시 (성지인 경우)
    if(_rS.idx>=0&&_markers[_rS.idx])
      _markers[_rS.idx].marker.setImage(_mkrImgRoute('#1b7a3e','출'));
    _enterRouteMode();
    _calcRoute();
  }

  // 지3인포: 검색지가 출발지
  if(_curFromRegion && _regionLat){
    const name=_regionPlaceName?`📍 ${_regionPlaceName}`:`📍 ${_regionName||'검색지'}`;
    doRoute(_regionLat, _regionLng, name);
    return;
  }

  // 지인포: 현위치가 출발지
  if(_myLat){
    doRoute(_myLat, _myLng, '📍 현위치');
  } else {
    navigator.geolocation.getCurrentPosition(
      p=>{ _setMyLoc(p.coords.latitude, p.coords.longitude); doRoute(p.coords.latitude, p.coords.longitude, '📍 현위치'); },
      ()=>alert('위치를 가져올 수 없습니다.'),
      {enableHighAccuracy:true, timeout:10000}
    );
  }
}

function openKakaoNav(){
  if(!_curInfoItem) return;
  const {item,idx}=_curInfoItem;
  const isMob=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  // 죽림굴이면 주차장으로 경로 안내
  const isJuk = idx === JUKRIMGUL_IDX && JUKRIMGUL_IDX >= 0;
  const navItem = isJuk ? {...item, lat:JUKRIMGUL_PARKING.lat, lng:JUKRIMGUL_PARKING.lng, kw:JUKRIMGUL_PARKING.kw, name:JUKRIMGUL_PARKING.name} : item;
  const ep=encodeURIComponent(navItem.kw||navItem.name);
  function launch(spLat,spLng){
    const w=spLat?`https://map.kakao.com/link/from/${encodeURIComponent('현재위치')},${spLat},${spLng}/to/${ep},${navItem.lat},${navItem.lng}`:
                  `https://map.kakao.com/link/to/${ep},${navItem.lat},${navItem.lng}`;
    const a=spLat?`kakaomap://route?sp=${spLat},${spLng}&ep=${navItem.lat},${navItem.lng}&by=CAR`:
                  `kakaomap://route?ep=${navItem.lat},${navItem.lng}&by=CAR`;
    if(isMob){
      _kakaoLaunching=true;
      setTimeout(()=>{_kakaoLaunching=false;},3000);
      const f=document.createElement('iframe');
      f.style.cssText='display:none;width:0;height:0;border:0;position:fixed;';
      document.body.appendChild(f);f.src=a;
      const t=setTimeout(()=>{_kakaoLaunching=false;window.open(w,'_blank');},1500);
      window.addEventListener('blur',()=>clearTimeout(t),{once:true});
      setTimeout(()=>{if(document.body.contains(f))document.body.removeChild(f);},2000);
    } else window.open(w,'_blank');
  }
  if(_myLat) launch(_myLat,_myLng);
  else if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>launch(p.coords.latitude,p.coords.longitude),
      ()=>launch(null,null),{enableHighAccuracy:true,timeout:8000,maximumAge:60000});
  } else launch(null,null);
}

function _mkrImg(color,big){
  const w=big?40:28,h=big?52:36;
  const svg=big?
    `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="52" viewBox="0 0 40 52"><path d="M20 0C8.954 0 0 8.954 0 20c0 14.21 20 32 20 32S40 34.21 40 20C40 8.954 31.046 0 20 0z" fill="${color}"/><circle cx="20" cy="20" r="9" fill="white" opacity="0.95"/><text x="20" y="25" text-anchor="middle" font-size="13" fill="${color}" font-family="serif" font-weight="bold">✝</text></svg>`:
    `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36"><path d="M14 0C6.268 0 0 6.268 0 14c0 9.941 14 22 14 22S28 23.941 28 14C28 6.268 21.732 0 14 0z" fill="${color}" opacity="0.9"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/><text x="14" y="18" text-anchor="middle" font-size="9" fill="${color}" font-family="serif" font-weight="bold">✝</text></svg>`;
  return new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
    new kakao.maps.Size(w,h),{offset:new kakao.maps.Point(w/2,h)});
}

function _mkrImgRoute(color,label){
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='36' height='46' viewBox='0 0 36 46'><ellipse cx='18' cy='43' rx='8' ry='3' fill='rgba(0,0,0,0.25)'/><path d='M18 2C9 2 2 9 2 18C2 28 18 42 18 42C18 42 34 28 34 18C34 9 27 2 18 2Z' fill='${color}' stroke='white' stroke-width='2.5'/><circle cx='18' cy='18' r='10' fill='white' opacity='0.9'/><text x='18' y='23' font-size='13' font-weight='900' fill='${color}' text-anchor='middle' font-family='Arial,sans-serif'>${label}</text></svg>`;
  return new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
    new kakao.maps.Size(36,46),{offset:new kakao.maps.Point(18,44)});
}

function _typeColor(t){return t==='성지'?'#c0392b':t==='순례지'?'#1565c0':'#1b7a3e';}

function _buildShrineMarkers(){
  _markers=new Array(SHRINES.length).fill(null);
  const BATCH=30;
  let idx=0;
  function next(){
    const end=Math.min(idx+BATCH,SHRINES.length);
    for(let i=idx;i<end;i++){
      const s=SHRINES[i];
      if(!s.lat||!s.lng||s.lat<33||s.lat>38||s.lng<124||s.lng>132) continue;
      const mk=new kakao.maps.Marker({
        position:new kakao.maps.LatLng(s.lat,s.lng),
        image:_mkrImg(_typeColor(s.type),false),title:s.name
      });
      mk.setMap(_map);
      (function(index){
        kakao.maps.event.addListener(mk,'click',()=>{
          if(_routeMode) _selectRouteMkr(index);
          else selectItem(index);
        });
      })(i);
      _markers[i]={marker:mk,shrine:s,index:i};
    }
    idx=end;
    if(idx<SHRINES.length) requestAnimationFrame(next);
  }
  requestAnimationFrame(next);
}

function _clearShrineMarkers(){
  _markers.forEach(m=>{if(m)m.marker.setMap(null);});
}

function _restoreMapMarkers(){
  if(_mode!=='shrine') return;
  _markers.forEach(m=>{
    if(!m) return;
    const s=m.shrine;
    const ok=(_filterDio==='all'||s.diocese===_filterDio)&&
             (!_listSrch||s.name.includes(_listSrch)||s.diocese.includes(_listSrch)||s.addr.includes(_listSrch));
    m.marker.setMap(ok?_map:null);
  });
}

function _selectShrineMarker(idx){
  if(_selIdx>=0&&_markers[_selIdx]){
    _markers[_selIdx].marker.setImage(_mkrImg(_typeColor(_markers[_selIdx].shrine.type),false));
    _markers[_selIdx].marker.setZIndex(1);
  }
  if(idx>=0&&_markers[idx]){
    _markers[idx].marker.setImage(_mkrImg('#FFE500',true));
    _markers[idx].marker.setZIndex(10);
  }
  _selIdx=idx;
}

function _clearShrineMarkerSel(){
  if(_selIdx>=0&&_markers[_selIdx]){
    _markers[_selIdx].marker.setImage(_mkrImg(_typeColor(_markers[_selIdx].shrine.type),false));
    _markers[_selIdx].marker.setZIndex(1);
  }
  _selIdx=-1;
}

function _showItemsOnMap(items){
  // 먼저 모두 숨김
  _markers.forEach(m=>{if(m)m.marker.setMap(null);});
  const bounds=new kakao.maps.LatLngBounds();
  items.forEach(s=>{
    const i=SHRINES.indexOf(s);
    if(i>=0&&_markers[i]){
      _markers[i].marker.setMap(_map);
      if(s.lat&&s.lng) bounds.extend(new kakao.maps.LatLng(s.lat,s.lng));
    }
  });
  try{_map.setBounds(bounds,60,60,60,60);}catch(e){}
}

// Parish 마커

function _autoLocate(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p=>{
    _setMyLoc(p.coords.latitude,p.coords.longitude);
    if(_mode==='shrine'){
      _map.setCenter(new kakao.maps.LatLng(p.coords.latitude,p.coords.longitude));
      _map.setLevel(8);
    }
  },()=>{},
  {enableHighAccuracy:false,timeout:3000,maximumAge:300000});
  setTimeout(()=>{
    navigator.geolocation.getCurrentPosition(p=>{
      _setMyLoc(p.coords.latitude,p.coords.longitude);
    },()=>{},{enableHighAccuracy:true,timeout:10000,maximumAge:0});
  },500);
}

function _setMyLoc(lat,lng){
  _myLat=lat;_myLng=lng;
  if(typeof kakao==='undefined'||!_map) return;  // 지도 미로드 시 무시
  if(_myMkr) _myMkr.setMap(null);
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'><circle cx='14' cy='14' r='12' fill='#1a73e8' opacity='.18'/><circle cx='14' cy='14' r='7' fill='#1a73e8'/><circle cx='14' cy='14' r='3.5' fill='white'/></svg>`;
  _myMkr=new kakao.maps.Marker({
    position:new kakao.maps.LatLng(lat,lng),
    image:new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
      new kakao.maps.Size(28,28),{offset:new kakao.maps.Point(14,14)})
  });
  _myMkr.setMap(_map);
}

function goMyLoc(){
  if(!navigator.geolocation) return alert('위치 정보를 지원하지 않습니다.');
  navigator.geolocation.getCurrentPosition(p=>{
    _setMyLoc(p.coords.latitude,p.coords.longitude);
    _map.setCenter(new kakao.maps.LatLng(p.coords.latitude,p.coords.longitude));
    _map.setLevel(7);
  },err=>{
    alert(err.code===1?'위치 권한을 허용해 주세요.':'위치를 가져올 수 없습니다.');
  },{enableHighAccuracy:true,timeout:10000});
}

function _loadNearby(){
  const body=document.getElementById('nearby-body');
  body.innerHTML='<div style="padding:40px;text-align:center;color:#aaa;font-size:14px">📍 위치를 확인하는 중...</div>';
  
  if(!navigator.geolocation){
    body.innerHTML='<div style="padding:30px;text-align:center;color:#c0392b;font-size:13px">⚠️ 위치 기능을 지원하지 않습니다</div>';
    return;
  }
  
  const go=(lat,lng)=>{
    _myLat=lat;_myLng=lng;
    if(_mode==='shrine') _loadNearbyShrines(lat,lng);
    else _loadNearbyParishes(lat,lng);
  };
  
  if(_myLat) { go(_myLat,_myLng); return; }
  
  navigator.geolocation.getCurrentPosition(p=>{
    _setMyLoc(p.coords.latitude,p.coords.longitude);
    go(p.coords.latitude,p.coords.longitude);
  },err=>{
    body.innerHTML=`<div style="padding:30px;text-align:center;color:#c0392b;font-size:13px">⚠️ ${err.code===1?'위치 권한을 허용해주세요':'위치를 가져올 수 없습니다'}</div>`;
  },{enableHighAccuracy:true,timeout:12000,maximumAge:60000});
}

function _loadNearbyShrines(lat,lng){
  const sorted=SHRINES
    .filter(s=>s.lat&&s.lng)
    .map(s=>({s,d:calcDist(lat,lng,s.lat,s.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,10);
  _nearbyCache=sorted.map(x=>x.s);
  
  // 지도에 10개만 표시
  if(_map) _showItemsOnMap(_nearbyCache);
  
  const body=document.getElementById('nearby-body');
  // 1단계: 직선×1.35 추정값으로 즉시 렌더
  body.innerHTML=sorted.map((x,i)=>{
    const idx=SHRINES.indexOf(x.s);
    const c=TC[x.s.type]||'#555';
    const estKm=(x.d*1.35).toFixed(1);
    return `<div class="nearby-item" onclick="selectItem(${idx},{fromNearby:true})">
      <div class="nearby-num" style="background:${c}">${i+1}</div>
      <div class="nearby-info">
        <div class="nearby-name">${x.s.name}</div>
        <div class="nearby-addr">${x.s.addr.substring(0,26)}${x.s.addr.length>26?'…':''}</div>
      </div>
      <div class="nearby-meta">
        <div class="nearby-type" style="background:${c}18;color:${c}">${x.s.type}</div>
        <div class="nearby-dist" id="ndist-${idx}">🚗${estKm}km</div>
      </div>
    </div>`;
  }).join('');

  // 2단계: 실제 자동차 거리 병렬 취득 후 업데이트
  sorted.forEach(x=>{
    const idx=SHRINES.indexOf(x.s);
    fetch(`https://apis-navi.kakaomobility.com/v1/directions?origin=${lng},${lat}&destination=${x.s.lng},${x.s.lat}&priority=RECOMMEND`,
      {headers:{Authorization:'KakaoAK '+REST}})
    .then(r=>r.json())
    .then(data=>{
      const route=data.routes?.[0];
      if(route&&route.result_code===0){
        const km=(route.summary.distance/1000).toFixed(1);
        const el=document.getElementById(`ndist-${idx}`);
        if(el) el.innerHTML=`🚗${km}km<span style="font-size:10px;color:#aaa;font-weight:400;margin-left:3px">${_fmtTime(route.summary.duration)}</span>`;
      }
    })
    .catch(()=>{});
  });
}

function _loadNearbyParishes(lat,lng){
  const sorted=PARISHES
    .filter(p=>p.lat&&p.lng)
    .map(p=>({p,d:calcDist(lat,lng,p.lat,p.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,10);
  _nearbyCache=sorted.map(x=>x.p);
  
  const body=document.getElementById('nearby-body');
  body.innerHTML=sorted.map((x,i)=>{
    const idx=PARISHES.indexOf(x.p);

      <div class="nearby-num" style="background:#8b5e3c">${i+1}</div>
      <div class="nearby-info">
        <div class="nearby-name">${x.p.name}</div>
        <div class="nearby-addr">${x.p.addr.substring(0,26)}${x.p.addr.length>26?'…':''}</div>
      </div>
      <div class="nearby-meta">
        <div class="nearby-type" style="background:#f5f0e8;color:#8b5e3c">⛪ 성당</div>
        <div class="nearby-dist" id="pdist-${idx}">🚗${estKm}km</div>
      </div>
    </div>`;
  }).join('');

  // 실제 자동차 거리 병렬 업데이트
  sorted.forEach(x=>{
    const idx=PARISHES.indexOf(x.p);
    fetch(`https://apis-navi.kakaomobility.com/v1/directions?origin=${lng},${lat}&destination=${x.p.lng},${x.p.lat}&priority=RECOMMEND`,
      {headers:{Authorization:'KakaoAK '+REST}})
    .then(r=>r.json())
    .then(data=>{
      const route=data.routes?.[0];
      if(route&&route.result_code===0){
        const km=(route.summary.distance/1000).toFixed(1);
        const el=document.getElementById(`pdist-${idx}`);
        if(el) el.innerHTML=`🚗${km}km<span style="font-size:10px;color:#aaa;font-weight:400;margin-left:3px">${_fmtTime(route.summary.duration)}</span>`;
      }
    })
    .catch(()=>{});
  });
}

function renderList(){
  const body=document.getElementById('list-body');
  if(!body) return;
  const items = _mode==='shrine' ? SHRINES : PARISHES;
  const q=_listSrch;
  const groups={};
  items.forEach((s,i)=>{
    if(_mode==='shrine' && (!s.lat||!s.lng||s.lat<33||s.lat>38)) return;
    const matchDio = q?true:(_filterDio==='all'||s.diocese===_filterDio);
    if(!matchDio) return;
    if(q&&!s.name.includes(q)&&!s.diocese.includes(q)&&!s.addr.includes(q)) return;
    if(!groups[s.diocese]) groups[s.diocese]=[];
    groups[s.diocese].push({s,i});
  });
  if(Object.keys(groups).length===0){
    body.innerHTML='<div style="padding:40px;text-align:center;color:#aaa;font-size:14px">검색 결과가 없습니다</div>';
    return;
  }
  body.innerHTML='';
  Object.entries(groups).forEach(([dio,entries])=>{
    const hd=document.createElement('div');
    hd.className='dio-hd';hd.textContent=dio;
    body.appendChild(hd);
    entries.forEach(({s,i})=>{
      const c=_mode==='shrine'?(TC[s.type]||'#555'):'#8b5e3c';
      const d=document.createElement('div');
      d.className='list-item';
      d.innerHTML=`<div class="li-dot" style="background:${c}"></div>
        <div class="li-info"><div class="li-name">${s.name}</div><div class="li-sub">${s.addr.substring(0,28)}${s.addr.length>28?'…':''}</div></div>
        <span class="li-badge" style="background:${c}18;color:${c}">${_mode==='shrine'?s.type:'성당'}</span>`;
      d.onclick=()=>selectItem(i);
      body.appendChild(d);
    });
  });
}

function doRegionSearch(){
  const inp=document.getElementById('region-inp');
  const q=(inp.value||'').trim();
  if(!q) return;
  inp.blur(); // 키보드 숨김
  const body=document.getElementById('region-body');
  body.innerHTML=`<div style="padding:40px;text-align:center;color:#aaa;font-size:13px">🔍 "${q}" 검색 중...</div>`;
  
  fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=1`,
    {headers:{Authorization:'KakaoAK '+REST}})
  .then(r=>r.json())
  .then(data=>{
    const doc=data.documents&&data.documents[0];
    if(!doc){
      body.innerHTML='<div style="padding:40px;text-align:center;color:#c0392b;font-size:13px">⚠️ 지역을 찾을 수 없습니다</div>';
      return;
    }
    const lat=parseFloat(doc.y), lng=parseFloat(doc.x);
    _regionLat=lat; _regionLng=lng; _regionName=q;
    _regionPlaceName=doc.place_name||q;
    _showRegionResults(q,lat,lng,doc);
  })
  .catch(()=>_showRegionFallback(q));
}

function _showRegionResults(q,lat,lng,doc){
  const items=_mode==='shrine'?SHRINES:PARISHES;
  const sorted=items.filter(s=>s.lat&&s.lng)
    .map(s=>({s,d:calcDist(lat,lng,s.lat,s.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,10);
  _regionCache=sorted.map(x=>x.s);
  
  if(_mode==='shrine'&&_map) _showItemsOnMap(_regionCache);
  
  const placeName=doc.place_name||q;
  const placeAddr=doc.road_address_name||doc.address_name||'';
  const placeCat=doc.category_name?doc.category_name.split(' > ').pop():'';
  const placeUrl=doc.place_url||'';
  const isParish=_mode==='parish';
  
  const infoCard=`<div class="region-info-card">
    <div class="ric-hd">
      <div class="ric-icon">📍</div>
      <div class="ric-name-wrap">
        <div class="ric-name">${placeName}</div>
        ${placeCat?`<div class="ric-cat">${placeCat}</div>`:''}
      </div>
      ${placeUrl?`<a class="ric-map-link" href="${placeUrl}" target="_blank">지도 ↗</a>`:''}
    </div>
    <div class="ric-body">
      ${placeAddr?`<div class="ric-row"><span class="ric-lbl">주소</span><span>${placeAddr}</span></div>`:''}
      <div class="ric-row"><span class="ric-lbl">좌표</span><span>${lat.toFixed(4)}, ${lng.toFixed(4)}</span></div>
    </div>
  </div>`;
  
  const listHd=`<div class="region-list-hd">${isParish?'⛪ 근처 본당':'✝ 근처 성지'} <span style="font-size:10px;font-weight:400;color:#aaa">· 가까운 순 10곳 · 탭 → 상세정보</span></div>`;
  
  const list=sorted.map((x,i)=>{
    const idx=items.indexOf(x.s);
    const c=_mode==='shrine'?(TC[x.s.type]||'#555'):'#8b5e3c';
    const typeLabel=_mode==='shrine'?x.s.type:'⛪ 성당';
    const estKm=(x.d*1.35).toFixed(1);
    const distId=`rdist-${idx}`;
    return `<div class="region-item" onclick="selectItem(${idx},{fromRegion:true})">
      <div class="nearby-num" style="background:${c};width:28px;height:28px;font-size:12px">${i+1}</div>
      <div class="nearby-info">
        <div class="nearby-name">${x.s.name}</div>
        <div class="nearby-addr">${x.s.addr.substring(0,26)}${x.s.addr.length>26?'…':''}</div>
      </div>
      <div class="nearby-meta">
        <div class="nearby-type" style="background:${c}18;color:${c}">${typeLabel}</div>
        <div class="nearby-dist" id="${distId}">🚗${estKm}km</div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('region-body').innerHTML=
    infoCard+listHd+`<div style="background:#fff">${list}</div>`;

  // 실제 자동차 거리 병렬 업데이트
  sorted.forEach(x=>{
    const idx=items.indexOf(x.s);
    const distId=`rdist-${idx}`;
    fetch(`https://apis-navi.kakaomobility.com/v1/directions?origin=${lng},${lat}&destination=${x.s.lng},${x.s.lat}&priority=RECOMMEND`,
      {headers:{Authorization:'KakaoAK '+REST}})
    .then(r=>r.json())
    .then(data=>{
      const route=data.routes?.[0];
      if(route&&route.result_code===0){
        const km=(route.summary.distance/1000).toFixed(1);
        const el=document.getElementById(distId);
        if(el) el.innerHTML=`🚗${km}km<span style="font-size:10px;color:#aaa;font-weight:400;margin-left:3px">${_fmtTime(route.summary.duration)}</span>`;
      }
    })
    .catch(()=>{});
  });
}

function _showRegionFallback(q){
  _regionPlaceName=q;
  const items=_mode==='shrine'?SHRINES:PARISHES;
  const matched=items.filter(s=>s.addr.includes(q)||s.name.includes(q)||s.diocese.includes(q)).slice(0,10);
  if(!matched.length){
    document.getElementById('region-body').innerHTML='<div style="padding:40px;text-align:center;color:#aaa;font-size:13px">검색 결과가 없습니다</div>';
    return;
  }
  _regionCache=matched;
  if(_mode==='shrine'&&_map) _showItemsOnMap(_regionCache);
  const items2=_mode==='shrine'?SHRINES:PARISHES;
  const list=matched.map((s,i)=>{
    const idx=items2.indexOf(s);
    const c=_mode==='shrine'?(TC[s.type]||'#555'):'#8b5e3c';
    return `<div class="region-item" onclick="selectItem(${idx},{fromRegion:true})">
      <div class="nearby-num" style="background:${c};width:26px;height:26px;font-size:12px">${i+1}</div>
      <div class="nearby-info"><div class="nearby-name">${s.name}</div><div class="nearby-addr">${s.addr.substring(0,26)}…</div></div>
      <div class="nearby-meta"><div class="nearby-type" style="background:${c}18;color:${c}">${_mode==='shrine'?s.type:'성당'}</div></div>
    </div>`;
  }).join('');
  document.getElementById('region-body').innerHTML=
    `<div style="padding:10px 16px 8px;font-size:12px;font-weight:700;color:#1565c0;background:#fff;border-bottom:1px solid #eee">검색결과 ${matched.length}곳</div>${list}`;
}

// ─────────────────────────────────
//  경로탐색 탭
// ─────────────────────────────────

function _enterRouteMode(){
  _routeMode=true;
  document.getElementById('route-guide').textContent='출발지를 탭하거나 지도에서 마커를 터치하세요';
  document.getElementById('route-guide').classList.add('on');
}

function _exitRouteMode(){
  _routeMode=false;
  document.getElementById('route-guide').classList.remove('on');
}

function setMyLocAsStart(){
  if(!navigator.geolocation) return alert('위치 정보를 지원하지 않습니다.');
  navigator.geolocation.getCurrentPosition(p=>{
    _setMyLoc(p.coords.latitude,p.coords.longitude);
    // 이전 출발 임시 마커 제거
    if(_startTmpMkr){ _startTmpMkr.setMap(null); _startTmpMkr=null; }
    // 이전 출발이 성지였으면 원래 이미지로 복원
    if(_rS&&_rS.idx>=0&&_markers[_rS.idx]) _markers[_rS.idx].marker.setImage(_mkrImg(_typeColor(_markers[_rS.idx].shrine.type),false));
    _rS={idx:-1,name:'📍 현위치',lat:p.coords.latitude,lng:p.coords.longitude};
    _setRouteLabel('start','📍 현위치');
    if(_rE) _updateSearchBtn();
    else {
      document.getElementById('route-guide').textContent='도착 성지를 탭하세요';
      document.getElementById('route-guide').classList.add('on');
    }
  },()=>alert('위치를 가져올 수 없습니다.'),{enableHighAccuracy:true,timeout:10000});
}

function _setRouteLabel(role,name){
  const el=document.getElementById(`rs-${role}-lbl`);
  if(!el) return;
  el.textContent=name||(role==='start'?'출발지를 선택하세요':'도착지를 선택하세요');
  el.className='rs-lbl'+(name?' filled':' empty');
  if(role==='end') document.getElementById('rs-end-x').style.display=name?'inline':'none';
  // 검색 버튼: 출발·도착 둘 다 채워졌을 때만 표시
  _updateSearchBtn();
}

function _updateSearchBtn(){
  const sLbl=document.getElementById('rs-start-lbl');
  const eLbl=document.getElementById('rs-end-lbl');
  const btn=document.getElementById('rs-search-btn');
  if(!btn) return;
  const filled=sLbl&&!sLbl.classList.contains('empty')&&eLbl&&!eLbl.classList.contains('empty');
  btn.style.display=filled?'flex':'none';
}

function doSearchRoute(){
  if(_rS&&_rE) _calcRoute();
}

function swapRoute(){
  // 임시 출발 마커 제거 (swap 후 재계산 시 다시 생성됨)
  if(_startTmpMkr){ _startTmpMkr.setMap(null); _startTmpMkr=null; }
  const sl=document.getElementById('rs-start-lbl').textContent;
  const el=document.getElementById('rs-end-lbl').textContent;
  _setRouteLabel('start',el.includes('선택하세요')?'':el);
  _setRouteLabel('end',sl.includes('선택하세요')?'':sl);
  const tmp=_rS; _rS=_rE; _rE=tmp;
  if(_rS&&_rS.idx>=0&&_markers[_rS.idx]) _markers[_rS.idx].marker.setImage(_mkrImgRoute('#1b7a3e','출'));
  if(_rE&&_rE.idx>=0&&_markers[_rE.idx]) _markers[_rE.idx].marker.setImage(_mkrImgRoute(_typeColor(_markers[_rE.idx].shrine.type),'도'));
  if(_rS&&_rE) _updateSearchBtn();
}

function clearRoute(role){
  if(role==='end'&&_rE){
    if(_rE.idx>=0&&_markers[_rE.idx]) _markers[_rE.idx].marker.setImage(_mkrImg(_typeColor(_markers[_rE.idx].shrine.type),false));
    _rE=null;
    _setRouteLabel('end','');
    document.getElementById('rs-result').style.display='none';
    if(_polyline){_polyline.setMap(null);_polyline=null;}
    if(_startTmpMkr){ _startTmpMkr.setMap(null); _startTmpMkr=null; }
    _restoreMapMarkers();
  }
}

function resetRoute(){
  if(_rS&&_rS.idx>=0&&_markers[_rS.idx]) _markers[_rS.idx].marker.setImage(_mkrImg(_typeColor(_markers[_rS.idx].shrine.type),false));
  if(_rE&&_rE.idx>=0&&_markers[_rE.idx]) _markers[_rE.idx].marker.setImage(_mkrImg(_typeColor(_markers[_rE.idx].shrine.type),false));
  _rS=_rE=null;
  _setRouteLabel('start','');_setRouteLabel('end','');
  document.getElementById('rs-result').style.display='none';
  document.getElementById('rs-hint').style.display='block';
  const sBtn=document.getElementById('rs-search-btn');
  if(sBtn) sBtn.style.display='none';
  if(_polyline){_polyline.setMap(null);_polyline=null;}
  // 출발 임시 마커 제거
  if(_startTmpMkr){ _startTmpMkr.setMap(null); _startTmpMkr=null; }
  // 죽림굴 주차장 마커 제거
  _showJukrimgulParkingMkr(false);
  document.getElementById('route-guide').classList.remove('on');
  _restoreMapMarkers();
}

function _selectRouteMkr(idx){
  const s=SHRINES[idx];
  if(_rS&&_rE){
    resetRoute();
  }
  if(!_rS){
    _rS={idx,name:s.name,lat:s.lat,lng:s.lng};
    _markers[idx]?.marker.setImage(_mkrImgRoute('#1b7a3e','출'));
    _setRouteLabel('start',s.name);
    document.getElementById('route-guide').textContent='도착 성지를 탭하세요';
    document.getElementById('route-guide').classList.add('on');
    if(!_activeTab) openTab('route');
  } else {
    _rE={idx,name:s.name,lat:s.lat,lng:s.lng};
    _markers[idx]?.marker.setImage(_mkrImgRoute(_typeColor(s.type),'도'));
    _setRouteLabel('end',s.name);
    document.getElementById('route-guide').classList.remove('on');
    // 검색 버튼 표시 (자동 계산 대신)
    _updateSearchBtn();
  }
}

async function _calcRoute(){
  if(!_rS||!_rE) return;
  document.getElementById('rs-km').textContent='…';
  document.getElementById('rs-time').textContent='…';
  document.getElementById('rs-result').style.display='block';
  document.getElementById('rs-hint').style.display='none';
  const sBtn=document.getElementById('rs-search-btn');
  if(sBtn) sBtn.style.display='none';
  if(_polyline){_polyline.setMap(null);_polyline=null;}

  // 죽림굴이면 주차장 좌표로 경로 계산
  const isJuk = _rE.idx === JUKRIMGUL_IDX && JUKRIMGUL_IDX >= 0;
  const navDest = isJuk ? JUKRIMGUL_PARKING : _rE;

  // 죽림굴 주차장 별도 마커 표시
  _showJukrimgulParkingMkr(isJuk);

  // 노트: 죽림굴이면 항상 표시
  const note=document.getElementById('rs-note');
  if(isJuk){
    note.innerHTML='⚠️ <b>죽림골주차장</b>까지 경로 안내 · 자동차가 올라가지 못하는 구간이므로 주차장에서 도보로 이동하세요.';
    note.style.display='block';
  } else {
    note.textContent='';note.style.display='none';
  }

  _drawLine(_rS, navDest, null);

  try{
    const res=await fetch(
      `https://apis-navi.kakaomobility.com/v1/directions?origin=${_rS.lng},${_rS.lat}&destination=${navDest.lng},${navDest.lat}&priority=RECOMMEND`,
      {headers:{Authorization:'KakaoAK '+REST,'Content-Type':'application/json'}});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    const route=data.routes?.[0];
    if(!route||route.result_code!==0) throw new Error('no route');
    const sum=route.summary;
    document.getElementById('rs-km').textContent=(sum.distance/1000).toFixed(1);
    document.getElementById('rs-time').textContent=_fmtTime(sum.duration);
    const path=[];
    for(const sec of route.sections||[])
      for(const road of sec.roads||[]){
        const vx=road.vertexes;
        for(let i=0;i<vx.length-1;i+=2) path.push(new kakao.maps.LatLng(vx[i+1],vx[i]));
      }
    _drawLine(_rS, navDest, path.length>1?path:null);
    // 죽림굴: 노트 유지
    if(!isJuk){ note.textContent='';note.style.display='none'; }
  } catch(e){
    const d=calcDist(_rS.lat,_rS.lng,navDest.lat,navDest.lng)*1.4;
    document.getElementById('rs-km').textContent=d.toFixed(1);
    document.getElementById('rs-time').textContent=_fmtTime(d/70*3600);
    if(!isJuk){
      note.textContent='* 직선거리 기반 추정값';note.style.display='block';
    }
  }
}

function _drawLine(s1,s2,path){
  if(_polyline) _polyline.setMap(null);
  // 출발 임시 마커 제거 후 재생성
  if(_startTmpMkr){ _startTmpMkr.setMap(null); _startTmpMkr=null; }
  const pts=path||[new kakao.maps.LatLng(s1.lat,s1.lng),new kakao.maps.LatLng(s2.lat,s2.lng)];
  _polyline=new kakao.maps.Polyline({path:pts,
    strokeWeight:path?6:3,strokeColor:path?'#1a73e8':'#b8965a',
    strokeOpacity:path?0.88:0.7,strokeStyle:path?'solid':'dashed'});
  _polyline.setMap(_map);

  // 출발지가 성지 마커가 아닌 경우(현위치/검색지, idx<0) → 별도 출발 마커 항상 표시
  if(_rS && (_rS.idx<0 || !_markers[_rS.idx])){
    _startTmpMkr = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(_rS.lat, _rS.lng),
      image: _mkrImgRoute('#1b7a3e','출'),
      zIndex: 15
    });
    _startTmpMkr.setMap(_map);
  }

  if(path){
    // 경로 표시 중 출발/도착 성지 마커만 표시, 나머지 숨김
    _markers.forEach((m,i)=>{
      if(!m) return;
      const isRoute=(_rS&&_rS.idx===i)||(_rE&&_rE.idx===i);
      m.marker.setMap(isRoute?_map:null);
    });
    const bounds=new kakao.maps.LatLngBounds();
    pts.forEach(p=>bounds.extend(p));
    // _startTmpMkr 위치도 bounds에 포함
    if(_startTmpMkr) bounds.extend(new kakao.maps.LatLng(s1.lat,s1.lng));
    // 지4목록/지4인포 시트 높이(~52vh)를 아래 패딩으로 반영
    const tabH=(document.getElementById('tabbar')?.offsetHeight)||54;
    const sheetH=Math.round(window.innerHeight*0.55);
    try{_map.setBounds(bounds,tabH+10,40,sheetH,40);}catch(e){}
  }
}

function _showJukrimgulParkingMkr(show){
  if(_jukrimgulParkMkr){ _jukrimgulParkMkr.setMap(null); _jukrimgulParkMkr=null; }
  if(!show||!_map) return;
  // 주차장 마커 (보라색 P)
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">
    <ellipse cx="17" cy="42" rx="6" ry="2.5" fill="rgba(0,0,0,.2)"/>
    <path d="M17 0C9.3 0 3 6.3 3 14c0 9.5 14 28 14 28S31 23.5 31 14C31 6.3 24.7 0 17 0z" fill="#7b2fbe"/>
    <circle cx="17" cy="14" r="9" fill="white" opacity=".9"/>
    <text x="17" y="19" text-anchor="middle" font-size="12" font-weight="900" fill="#7b2fbe" font-family="sans-serif">P</text>
  </svg>`;
  _jukrimgulParkMkr = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(JUKRIMGUL_PARKING.lat, JUKRIMGUL_PARKING.lng),
    image: new kakao.maps.MarkerImage(
      'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
      new kakao.maps.Size(34,44),{offset:new kakao.maps.Point(17,44)}
    ),
    title:'죽림골주차장', zIndex:15
  });
  _jukrimgulParkMkr.setMap(_map);
  // 죽림굴 실제 마커도 함께 표시
  if(JUKRIMGUL_IDX>=0 && _markers[JUKRIMGUL_IDX])
    _markers[JUKRIMGUL_IDX].marker.setMap(_map);
}

function doKakaoRoute(){
  if(!_rS||!_rE) return;
  const isMob=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isJuk = _rE.idx === JUKRIMGUL_IDX && JUKRIMGUL_IDX >= 0;
  const dest = isJuk ? JUKRIMGUL_PARKING : _rE;
  const sp=encodeURIComponent(_rS.name),ep=encodeURIComponent(dest.name||dest.kw);
  const w=`https://map.kakao.com/link/from/${sp},${_rS.lat},${_rS.lng}/to/${ep},${dest.lat},${dest.lng}`;
  const a=`kakaomap://route?sp=${_rS.lat},${_rS.lng}&ep=${dest.lat},${dest.lng}&by=CAR`;
  if(isMob){
    _kakaoLaunching=true;
    setTimeout(()=>{_kakaoLaunching=false;},3000);
    const f=document.createElement('iframe');
    f.style.cssText='display:none;width:0;height:0;border:0;position:fixed;';
    document.body.appendChild(f);f.src=a;
    const t=setTimeout(()=>{_kakaoLaunching=false;window.open(w,'_blank');},1500);
    window.addEventListener('blur',()=>clearTimeout(t),{once:true});
    setTimeout(()=>{if(document.body.contains(f))document.body.removeChild(f);},2000);
  } else window.open(w,'_blank');
}

//  검색 모달 (경로탐색용)

function openSearchModal(role){
  _smRole=role;_smDio='all';
  document.querySelectorAll('.sm-fb').forEach(b=>b.classList.remove('on'));
  document.querySelector('.sm-fb')?.classList.add('on');
  document.getElementById('sm-title').textContent=role==='start'?'🔵 출발 성지 검색':'🔴 도착 성지 검색';
  document.getElementById('sm-inp').value='';
  filterModal('');
  document.getElementById('srch-modal').classList.add('open');
  setTimeout(()=>document.getElementById('sm-inp')?.focus(),300);
}

function closeSearchModal(){
  document.getElementById('srch-modal').classList.remove('open');
}

function setSmDio(v,btn){
  _smDio=v;
  document.querySelectorAll('.sm-fb').forEach(b=>b.classList.remove('on'));
  btn?.classList.add('on');
  filterModal(document.getElementById('sm-inp')?.value||'');
}

function filterModal(q){
  const body=document.getElementById('sm-body');
  const groups={};
  SHRINES.forEach((s,i)=>{
    const matchDio=q?true:(_smDio==='all'||s.diocese===_smDio);
    if(!matchDio) return;
    if(q&&!s.name.includes(q)&&!s.diocese.includes(q)&&!s.addr.includes(q)) return;
    if(!s.lat||!s.lng) return;
    if(!groups[s.diocese]) groups[s.diocese]=[];
    groups[s.diocese].push({s,i});
  });
  let html='';
  Object.entries(groups).forEach(([dio,items])=>{
    const c=_smRole==='start'?'#1565c0':'#c0392b';
    html+=`<div class="sm-grp" style="color:${c}">${dio}</div>`;
    items.forEach(({s,i})=>{
      const tc=TC[s.type]||'#555';
      html+=`<div class="sm-item" onclick="selectFromModal(${i})">
        <div style="width:28px;height:28px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0">${_smRole==='start'?'출':'도'}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div><div style="font-size:11px;color:#888;margin-top:1px">${s.addr}</div></div>
        <span style="font-size:10px;color:${tc};font-weight:700;padding:2px 7px;border-radius:10px;background:${tc}18;white-space:nowrap">${s.type}</span>
      </div>`;
    });
  });
  body.innerHTML=html||'<div style="padding:32px;text-align:center;color:#aaa;font-size:13px">검색 결과가 없습니다</div>';
}

function selectFromModal(idx){
  const s=SHRINES[idx];
  if(!s) return;
  closeSearchModal();
  const role=_smRole;
  if(role==='start'){
    if(_rS&&_rS.idx>=0&&_markers[_rS.idx]) _markers[_rS.idx].marker.setImage(_mkrImg(_typeColor(_markers[_rS.idx].shrine.type),false));
    // 이전 출발 임시 마커 제거
    if(_startTmpMkr){ _startTmpMkr.setMap(null); _startTmpMkr=null; }
    _rS={idx,name:s.name,lat:s.lat,lng:s.lng};
    _markers[idx]?.marker.setImage(_mkrImgRoute(_typeColor(s.type),'출'));
    _setRouteLabel('start',s.name);
    _enterRouteMode();
    if(_rE) _updateSearchBtn();
    else {
      document.getElementById('route-guide').textContent='도착 성지를 탭하세요';
      document.getElementById('route-guide').classList.add('on');
    }
  } else {
    if(_rE&&_rE.idx>=0&&_markers[_rE.idx]) _markers[_rE.idx].marker.setImage(_mkrImg(_typeColor(_markers[_rE.idx].shrine.type),false));
    _rE={idx,name:s.name,lat:s.lat,lng:s.lng};
    _markers[idx]?.marker.setImage(_mkrImgRoute(_typeColor(s.type),'도'));
    _setRouteLabel('end',s.name);
    document.getElementById('route-guide').classList.remove('on');
    if(_rS) _updateSearchBtn();
    else document.getElementById('route-guide').textContent='출발 성지를 탭하세요';
  }
  if(!_activeTab||_activeTab!=='route') openTab('route');
  if(s.lat&&s.lng&&_map) _map.panTo(new kakao.maps.LatLng(s.lat,s.lng));
}

// ─────────────────────────────────
//  유틸
// ─────────────────────────────────

function calcDist(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.asin(Math.sqrt(x));
}
function _fmtTime(s){
  if(!s||s<60) return '1분 미만';
  const m=Math.round(s/60);
  if(m<60) return m+'분';
  return Math.floor(m/60)+'시간'+(m%60?' '+m%60+'분':'');
}

// ─────────────────────────────────
//  표지 pull-to-refresh
// ─────────────────────────────────
(function(){
  const cover=document.getElementById('cover');
  const pull=document.getElementById('cv-pull');
  const txt=document.getElementById('cv-pull-txt');
  let startY=0, curY=0, active=false;
  const THRESHOLD=80;
  cover.addEventListener('touchstart',e=>{
    if(document.documentElement.classList.contains('app-active')) return;
    startY=e.touches[0].clientY; active=true;
  },{passive:true});
  cover.addEventListener('touchmove',e=>{
    if(!active) return;
    curY=e.touches[0].clientY;
    const dy=curY-startY;
    if(dy>10){
      pull.classList.add('visible');
      if(dy>=THRESHOLD){pull.classList.add('ready');txt.textContent='놓으면 새로고침';}
      else{pull.classList.remove('ready');txt.textContent='당겨서 새로고침';}
    }
  },{passive:true});
  cover.addEventListener('touchend',()=>{
    if(!active) return; active=false;
    const dy=curY-startY;
    pull.classList.remove('visible','ready');
    txt.textContent='당겨서 새로고침';
    if(dy>=THRESHOLD) setTimeout(()=>location.reload(),120);
    startY=curY=0;
  });
})();

// SW
(function(){
  if(!('serviceWorker' in navigator)||location.protocol==='file:') return;
  window.addEventListener('load',async()=>{
    try{
      const code=`const C='k3v1';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.url.includes('kakao')||e.request.url.includes('dapi'))return;e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));return r;}).catch(()=>caches.match(e.request)));});`;
      const blob=new Blob([code],{type:'application/javascript'});
      await navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'});
    }catch(e){}
  });
})();
